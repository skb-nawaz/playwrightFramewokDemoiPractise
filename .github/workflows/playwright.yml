name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      USERNAME_TOKEN: ${{ secrets.USERNAME_TOKEN }}
      PASSWORD_TOKEN: ${{ secrets.PASSWORD_TOKEN }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

      - name: Generate Linux Snapshots
        if: always()
        run: |
          npx playwright test --project=chromium --project=firefox --update-snapshots
          zip -r visual-snapshots.zip tests/*-snapshots

      - name: Upload Snapshot Zip
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-snapshots
          path: visual-snapshots.zip
          retention-days: 30

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
